version: '3.8'

services:
  composer-api:
    build: .
    image: jjb8966/composer-api:latest
    container_name: composer-api
    restart: always
    ports:
      - "8788:8788"
    environment:
      PORT: "8788"
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      CURSOR_BACKEND_BASE_URL: ${CURSOR_BACKEND_BASE_URL:-}
      CURSOR_CHAT_ENDPOINT: ${CURSOR_CHAT_ENDPOINT:-}
      CURSOR_SDK_BRIDGE_URL: ${CURSOR_SDK_BRIDGE_URL:-}
      CURSOR_SDK_BRIDGE_TOKEN: ${CURSOR_SDK_BRIDGE_TOKEN:-}
      WAITLIST_API_TOKEN: ${WAITLIST_API_TOKEN:-standard-agents-waitlist-token}
    volumes:
      - composer-api-wrangler:/app/.wrangler
    networks:
      - nginx-network

volumes:
  composer-api-wrangler:

networks:
  nginx-network:
    external: true
